name: Release

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "patches/**"
      - "extensions/**"
      - "gradle/**"
      - "*.gradle.kts"
      - "gradle.properties"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Build patch bundle
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GPR_USER: ${{ secrets.GPR_USER }}
          GPR_KEY: ${{ secrets.GPR_KEY }}
        run: |
          chmod +x gradlew
          ARGS=""
          if [ -n "$GPR_KEY" ]; then
            ARGS="-Pgpr.user=$GPR_USER -Pgpr.key=$GPR_KEY"
          fi
          ./gradlew build --no-daemon $ARGS

      - name: Publish my-patches.mpp to the stable 'latest' release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          MPP=$(ls patches/build/libs/patches-*.mpp | grep -vE 'sources|javadoc' | head -1)
          if [ -z "$MPP" ]; then
            echo "No .mpp produced under patches/build/libs/" >&2
            exit 1
          fi
          cp "$MPP" my-patches.mpp
          if gh release view latest >/dev/null 2>&1; then
            gh release upload latest my-patches.mpp --clobber
          else
            gh release create latest my-patches.mpp \
              --title "latest" \
              --notes "Rolling build of morphe-portal-patch. Stable asset URL: my-patches.mpp"
          fi
